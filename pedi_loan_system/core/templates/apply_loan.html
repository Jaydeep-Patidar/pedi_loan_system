{% extends 'base.html' %}
{% load custom_filters %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4>Apply for a Loan</h4>
            </div>
            <div class="card-body">
                <p>Applications open until {{ settings.end_date|date:"d-m-Y" }}.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label>Requested Amount (₹)</label>
                        <input type="number" name="amount" step="1000" min="1000" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Purpose (optional)</label>
                        <textarea name="purpose" class="form-control" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn btn-success">Submit Application</button>
                    <a href="{% url 'member_dashboard' %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
